<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        pixel: ['"Press Start 2P"', 'monospace'],
                    },
                    keyframes: {
                        floatUp: {
                            '0%': { transform: 'translateY(0) rotate(0deg) scale(1)', opacity: '0' },
                            '10%': { opacity: '1' },
                            '90%': { opacity: '1' },
                            '100%': { transform: 'translateY(-110vh) rotate(360deg) scale(0.6)', opacity: '0' },
                        },
                        pulseGlow: {
                            '0%, 100%': {
                                textShadow: '0 0 10px #ff66aa, 0 0 20px #ff3399, 0 0 40px #ff3399',
                                transform: 'scale(1)',
                            },
                            '50%': {
                                textShadow: '0 0 20px #ff66aa, 0 0 40px #ff3399, 0 0 80px #ff0066',
                                transform: 'scale(1.08)',
                            },
                        },
                        heartbeat: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '25%': { transform: 'scale(1.3)' },
                            '50%': { transform: 'scale(1)' },
                            '75%': { transform: 'scale(1.2)' },
                        },
                        sadFloat: {
                            '0%, 100%': { transform: 'translate(-50%, -50%) scale(1)', opacity: '0.8' },
                            '50%': { transform: 'translate(-50%, -53%) scale(1.06)', opacity: '1' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                        fadeScaleIn: {
                            '0%': { opacity: '0', transform: 'translate(-50%, -50%) scale(0.5)' },
                            '100%': { opacity: '1', transform: 'translate(-50%, -50%) scale(1)' },
                        },
                        windowShake: {
                            '0%, 100%': { transform: 'translate(0, 0)' },
                            '10%': { transform: 'translate(-5px, -3px)' },
                            '20%': { transform: 'translate(5px, 3px)' },
                            '30%': { transform: 'translate(-4px, 4px)' },
                            '40%': { transform: 'translate(4px, -4px)' },
                            '50%': { transform: 'translate(-3px, 3px)' },
                            '60%': { transform: 'translate(3px, -3px)' },
                            '70%': { transform: 'translate(-2px, 2px)' },
                            '80%': { transform: 'translate(2px, -2px)' },
                            '90%': { transform: 'translate(-1px, 1px)' },
                        },
                        tearDrop: {
                            '0%': { transform: 'translateY(0) scaleY(1)', opacity: '0.8' },
                            '80%': { opacity: '0.8' },
                            '100%': { transform: 'translateY(30px) scaleY(1.5)', opacity: '0' },
                        },
                    },
                    animation: {
                        'float-up': 'floatUp 5s ease-in forwards',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                        'heartbeat': 'heartbeat 1s ease-in-out infinite',
                        'sad-float': 'sadFloat 3s ease-in-out infinite',
                        'shimmer': 'shimmer 3s linear infinite',
                        'fade-scale-in': 'fadeScaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'window-shake': 'windowShake 0.5s ease-in-out',
                        'tear-drop': 'tearDrop 1s ease-in infinite',
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Press Start 2P', monospace; }
    </style>
</head>
<body class="bg-black m-0 p-0 overflow-hidden h-screen">

    <!-- Popup Window -->
    <div id="viewInterface" class="absolute inset-0 flex justify-center items-center z-10">
        <div id="popupWindow" class="bg-black border-2 sm:border-4 border-double border-white w-[340px] sm:w-[420px] max-w-[92%] shadow-[8px_8px_0_#1a1a1a] sm:shadow-[12px_12px_0_#1a1a1a] transition-all duration-300">
            <div class="border-b-2 sm:border-b-4 border-white p-2 sm:p-3 flex gap-1 sm:gap-2">
                <span class="w-2 h-2 sm:w-3 sm:h-3 border-2 border-white"></span>
                <span class="w-2 h-2 sm:w-3 sm:h-3 border-2 border-white"></span>
                <span class="w-2 h-2 sm:w-3 sm:h-3 border-2 border-white"></span>
            </div>
            <div class="py-8 sm:py-12 px-4 sm:px-6 text-center">
                <h1 class="text-white text-[10px] sm:text-sm leading-relaxed mb-8 sm:mb-12">Do you love me?</h1>
                <div class="flex justify-center gap-6 sm:gap-8">
                    <button onclick="triggerYes()" class="bg-transparent text-white border-4 border-t-white border-l-white border-r-gray-500 border-b-gray-500 px-5 sm:px-6 py-2 sm:py-3 text-[10px] sm:text-xs cursor-pointer font-pixel hover:bg-white hover:text-black hover:border-gray-500 hover:border-inset transition-all duration-150 active:translate-x-[2px] active:translate-y-[2px]">
                        Yes
                    </button>
                    <button onclick="triggerNo()" class="bg-transparent text-white border-4 border-t-white border-l-white border-r-gray-500 border-b-gray-500 px-5 sm:px-6 py-2 sm:py-3 text-[10px] sm:text-xs cursor-pointer font-pixel hover:bg-white hover:text-black hover:border-gray-500 hover:border-inset transition-all duration-150 active:translate-x-[2px] active:translate-y-[2px]">
                        No
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sad Face -->
    <div id="sadFace" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 text-5xl sm:text-7xl text-blue-400 animate-sad-float"
         style="text-shadow: 0 0 20px #3366aa, 0 0 40px #2255aa, 0 0 60px #114499; filter: drop-shadow(0 0 10px #4488cc);">
        :(
    </div>

    <!-- Sad Tears (on face) -->
    <div id="sadTears" class="hidden fixed z-21 pointer-events-none" style="top: 57%; left: 50%; transform: translateX(-50%);">
        <div class="absolute -left-6 sm:-left-8 top-3 sm:top-4 w-1 h-2 sm:h-3 bg-blue-400 rounded-full animate-tear-drop" style="animation-delay: 0s;"></div>
        <div class="absolute -left-4 sm:-left-6 top-4 sm:top-6 w-1 h-1.5 sm:h-2 bg-blue-300 rounded-full animate-tear-drop" style="animation-delay: 0.4s;"></div>
        <div class="absolute left-4 sm:left-6 top-3 sm:top-4 w-1 h-2 sm:h-3 bg-blue-400 rounded-full animate-tear-drop" style="animation-delay: 0.2s;"></div>
        <div class="absolute left-6 sm:left-8 top-4 sm:top-6 w-1 h-1.5 sm:h-2 bg-blue-300 rounded-full animate-tear-drop" style="animation-delay: 0.6s;"></div>
    </div>

    <!-- Rain Container (Canvas) -->
    <div id="sadRain" class="hidden fixed inset-0 z-5 pointer-events-none"></div>

    <!-- Floating Hearts Container -->
    <div id="floatingHearts" class="hidden fixed inset-0 overflow-hidden pointer-events-none" style="z-index:6;"></div>

    <!-- Love Text -->
    <div id="loveText" class="hidden fixed inset-0 z-20 pointer-events-none flex flex-col items-center justify-center">
        <div class="animate-pulse-glow flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-0 px-4">
            <span class="text-pink-400 text-2xl sm:text-3xl md:text-5xl inline-block animate-heartbeat" style="filter: drop-shadow(0 0 15px #ff3399);">&#10084;</span>
            <span class="text-pink-300 text-lg sm:text-xl md:text-3xl mx-0 sm:mx-4 tracking-wider text-center" style="text-shadow: 0 0 10px #ff66aa, 0 0 30px #ff3399;">I love uu</span>
            <span class="text-pink-400 text-2xl sm:text-3xl md:text-5xl inline-block animate-heartbeat" style="animation-delay: 0.5s; filter: drop-shadow(0 0 15px #ff3399);">&#10084;</span>
        </div>
        <div class="mt-6 sm:mt-8 text-pink-500/60 text-[7px] sm:text-[8px] tracking-[0.2em] sm:tracking-[0.3em] animate-pulse" style="text-shadow: 0 0 8px #ff3399;">
            forever and always
        </div>
    </div>

    <!-- Background Gradient for Yes -->
    <div id="loveGradient" class="hidden fixed inset-0 z-1 opacity-0 transition-opacity duration-1000"
         style="background: radial-gradient(ellipse at center, rgba(255,51,153,0.15) 0%, rgba(0,0,0,0) 70%);"></div>

    <!-- Background Gradient for No -->
    <div id="sadGradient" class="hidden fixed inset-0 z-1 opacity-0 transition-opacity duration-1000"
         style="background: radial-gradient(ellipse at center, rgba(50,100,180,0.15) 0%, rgba(0,0,0,0) 70%);"></div>

    <!-- Hidden Audio Players -->
    <audio id="audioLove" preload="auto" loop>
        <source src="yes-song.mp3" type="audio/mp3">
    </audio>
    <audio id="audioSad" preload="auto" loop>
        <source src="sad-song.mp3" type="audio/mp3">
    </audio>

    <div style="position:fixed;bottom:4px;left:0;width:100%;text-align:center;z-index:50;pointer-events:none;user-select:none;opacity:0.12;font-size:6px;color:#888;font-family:Arial,sans-serif;">
        Music: "Angel" by Massive Attack (Horace Andy) &amp; "I Miss You" by FSM Team
    </div>

    <script>
        const NTFY_TOPIC = 'love-uu-notif';

        function sendNtfy(type) {
            const data = type === 'yes'
                ? { message: '❤️ Someone clicked YES! They love you too! ❤️', title: '💘 YES', priority: 5, tags: ['heart', 'sparkles'] }
                : { message: '💔 Someone clicked NO... 💔', title: '💔 NO', priority: 4, tags: ['broken_heart', 'cry'] };

            fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' },
            }).catch(() => {
                navigator.sendBeacon(`https://ntfy.sh/${NTFY_TOPIC}`, data.message);
            });
        }

        function triggerYes() {
            const popup = document.getElementById('popupWindow');
            popup.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            popup.style.transform = 'scale(0.8)';
            popup.style.opacity = '0';

            document.getElementById('audioSad').pause();
            document.getElementById('audioSad').currentTime = 0;

            setTimeout(() => {
                document.getElementById('viewInterface').style.display = 'none';

                const gradient = document.getElementById('loveGradient');
                gradient.classList.remove('hidden');
                requestAnimationFrame(() => { gradient.style.opacity = '1'; });

                document.getElementById('floatingHearts').classList.remove('hidden');
                document.getElementById('loveText').classList.remove('hidden');

                document.getElementById('audioLove').volume = 0.3;
                document.getElementById('audioLove').currentTime = 172;
                document.getElementById('audioLove').play();

                spawnHeartsContinuously();

                sendNtfy('yes');
            }, 350);
        }

        function spawnHeartsContinuously() {
            const container = document.getElementById('floatingHearts');
            const symbols = ['❤', '💖', '💗', '💕', '💘', '💝', '🩷', '🤍'];
            const colors = ['#ff3366', '#ff66aa', '#ff1493', '#ff69b4', '#ee82ee', '#ff6eb4', '#ff0066', '#ffffff'];

            function spawn() {
                const heart = document.createElement('div');
                heart.className = 'absolute bottom-0 animate-float-up pointer-events-none';
                heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];

                const size = Math.random() * 24 + 18;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const duration = Math.random() * 3 + 4;
                const delay = Math.random() * 0.5;

                heart.style.cssText = `
                    left: ${left}vw;
                    font-size: ${size}px;
                    color: ${color};
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    filter: drop-shadow(0 0 8px ${color});
                    z-index: 6;
                `;

                container.appendChild(heart);
                setTimeout(() => heart.remove(), (duration + delay) * 1000 + 500);
            }

            for (let i = 0; i < 20; i++) {
                setTimeout(spawn, i * 150);
            }
            window._heartInterval = setInterval(spawn, 250);
        }

        function triggerNo() {
            const popup = document.getElementById('popupWindow');
            popup.classList.add('animate-window-shake');

            document.getElementById('audioLove').pause();
            document.getElementById('audioLove').currentTime = 0;

            setTimeout(() => {
                popup.style.transition = 'all 0.4s ease-in';
                popup.style.transform = 'scale(0.8) rotate(-3deg)';
                popup.style.opacity = '0';

                setTimeout(() => {
                    document.getElementById('viewInterface').style.display = 'none';

                    const gradient = document.getElementById('sadGradient');
                    gradient.classList.remove('hidden');
                    requestAnimationFrame(() => { gradient.style.opacity = '1'; });

                    document.getElementById('sadFace').classList.remove('hidden');
                    document.getElementById('sadTears').classList.remove('hidden');
                    document.getElementById('sadRain').classList.remove('hidden');

                    document.getElementById('audioSad').volume = 0.3;
                    document.getElementById('audioSad').currentTime = 60;
                    document.getElementById('audioSad').play();

                    spawnRain();

                    sendNtfy('no');
                }, 350);
            }, 500);
        }

        function spawnRain() {
            const container = document.getElementById('sadRain');
            container.innerHTML = '';

            const canvas = document.createElement('canvas');
            canvas.id = 'rainCanvas';
            canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const drops = [];
            const count = 500;

            for (let i = 0; i < count; i++) {
                drops.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * -canvas.height,
                    length: Math.random() * 25 + 10,
                    speed: Math.random() * 8 + 6,
                    opacity: Math.random() * 0.4 + 0.25,
                    width: Math.random() > 0.8 ? 2.5 : 1.2,
                });
            }

            function animateRain() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (const d of drops) {
                    d.y += d.speed * (canvas.height / 800);
                    if (d.y > canvas.height) {
                        d.y = -d.length - Math.random() * 100;
                        d.x = Math.random() * canvas.width;
                    }

                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x - d.width * 0.3, d.y - d.length);
                    ctx.strokeStyle = `rgba(100, 180, 230, ${d.opacity})`;
                    ctx.lineWidth = d.width;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                ctx.fillStyle = 'rgba(100, 180, 230, 0.03)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                requestAnimationFrame(animateRain);
            }

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            animateRain();
        }
    </script>
</body>
</html>
